<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>JavaScript, 2.E</h1>
    <hr>

    <h2>Zmen text</h2>
    <button onclick="changeText()">klikni</button>
    <p id="text-output">Tento text se zmeni</p>
    <hr>

    <h2>Zmen pozadi</h2>

    <script>
    function changeText() {
        let textBox = document.getElementById("text-output");
        textBox.textContent = "Kliknul jsi na neco";
    }
    </script>
</body>
</html>
